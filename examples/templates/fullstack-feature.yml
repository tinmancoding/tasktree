apiVersion: tasktree.dev/v1
kind: Template

metadata:
  name: fullstack-feature
  description: API + Web + Shared libs for a feature

parameters:
  - name: feature_name
    required: true
    description: Feature name (used in branch names)
  - name: ticket_number
    default: ""
    description: Optional ticket reference

template:
  metadata:
    name: "{{feature_name}}"
    annotations:
      ticket: "{{ticket_number}}"
      type: feature

  spec:
    sources:
      - name: api
        type: git
        git:
          url: "@api"
          branch: "feature/{{feature_name}}"

      - name: web
        type: git
        git:
          url: "@web"
          branch: "feature/{{feature_name}}"

      - name: shared
        type: git
        git:
          url: "@shared"
          ref: main

    bootstrap:
      - name: install-api-deps
        run: npm ci
        workdir: api
      - name: install-web-deps
        run: npm ci
        workdir: web
      - name: generate-config
        run: ./scripts/gen-local-config.sh
        workdir: api
        env:
          ENVIRONMENT: local
          FEATURE: "{{feature_name}}"
