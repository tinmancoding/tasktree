site_name: Tasktree
site_description: Task-focused multi-repository workspace manager
site_url: https://tinmancoding.github.io/tasktree
repo_url: https://github.com/tinmancoding/tasktree
repo_name: tinmancoding/tasktree

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Migrating from .tasktree.toml: getting-started/migration.md
  - Concepts:
    - Overview: concepts/overview.md
    - Workspace Spec: concepts/workspace-spec.md
    - Source Types: concepts/source-types.md
    - Repository Aliases: concepts/repo-aliases.md
    - Global Registry: concepts/registry.md
  - CLI Reference:
    - Overview: cli/overview.md
    - init: cli/init.md
    - add: cli/add.md
    - apply: cli/apply.md
    - remove: cli/remove.md
    - repos: cli/repos.md
    - status: cli/status.md
    - list: cli/list.md
    - root: cli/root.md
    - prune: cli/prune.md
    - migrate: cli/migrate.md
    - repo: cli/repo.md
  - Common Patterns:
    - Multi-Service Feature Branch: patterns/multi-service-feature.md
    - Hotfix Workflow: patterns/hotfix-workflow.md
    - Sharing a Workspace: patterns/applying-from-spec.md
