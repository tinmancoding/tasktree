version: 2

project_name: tasktree

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: tasktree
    main: ./cmd/tasktree
    binary: tasktree
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: tasktree
    ids:
      - tasktree
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  mode: keep-existing
  replace_existing_artifacts: true
